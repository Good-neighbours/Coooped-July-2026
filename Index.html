const fakeSmartReplies = (incomingText) => {
  const t = incomingText.toLowerCase();
  if (t.includes("ready") || t.includes("pickup")) return ["Yes, ready now!", "Give me 10 mins", "Not yet, will text you"];
  if (t.includes("visit") || t.includes("come")) return ["Works for me", "Can we do later?", "Confirmed, see you then"];
  if (t.includes("moodboard") || t.includes("design")) return ["Looks great!", "Can we tweak the colors?", "Love it, thank you!"];
  return ["Sounds good!", "I'm on it.", "Got it, thanks!"];
};

const VerificationModal = ({ isOpen, onClose, listing, onVerifySuccess }) => {
  const [secret, setSecret] = useState('');
  const [error, setError] = useState('');
  const [step, setStep] = useState(1);

  if (!isOpen || !listing) return null;
  const isBusiness = listing.type === 'business';

  const handleNext = () => { setStep(2); setError(''); };
  const handleSubmit = () => {
    if (secret.toUpperCase() === listing.verificationSecret.toUpperCase()) {
      onVerifySuccess(listing.id);
      onClose();
    } else {
      setError(isBusiness
        ? "Incorrect business license key or GST number."
        : "The shared secret word or OTP does not match the neighbor's record. Please try again or message them."
      );
    }
  };

  const VerificationInfo = (
    <div className="space-y-4">
      <div className="p-3 bg-indigo-50 rounded-lg border border-indigo-200 flex items-start gap-3">
        <Shield className="w-5 h-5 text-indigo-600 flex-shrink-0 mt-0.5" />
        <div>
          <h4 className="font-bold text-indigo-800">Verify trust, not just identity</h4>
          <p className="text-sm text-indigo-700 mt-1">
            To ensure genuine trust, you need to confirm you know {listing.name} by matching a small piece of shared information.
          </p>
        </div>
      </div>
      <div className="text-sm text-slate-600 space-y-2">
        <p>For {listing.name}'s skill: they should have provided you with a verification secret (e.g. a shared word, their building number, or the last 4 digits of their phone number) prior to this.</p>
        {isBusiness && (
          <p className="p-2 bg-yellow-50 rounded-md">For businesses: this secret is typically the last 5 digits of their registered GST/business license.</p>
        )}
        <p>Verification secret (for testing): <span className="font-mono bg-slate-200 px-2 py-0.5 rounded text-xs">{listing.verificationSecret}</span></p>
      </div>
      <button onClick={handleNext} className="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2">
        Proceed to verification <ChevronRight className="w-5 h-5" />
      </button>
    </div>
  );

  const VerificationInput = (
    <div className="space-y-4">
      <h4 className="font-semibold text-slate-700">Enter {isBusiness ? 'business key' : 'secret word'} for {listing.name}:</h4>
      <input
        type="text"
        className="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-mono tracking-wider uppercase"
        placeholder={isBusiness ? "e.g., GST-XXXXX" : "Secret word"}
        value={secret}
        onChange={(e) => { setSecret(e.target.value); setError(''); }}
      />
      {error && <div className="p-2 bg-red-100 text-red-700 text-xs rounded-lg">{error}</div>}
      <button
        onClick={handleSubmit}
        className="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
        disabled={secret.length < 3}
      >
        <BadgeCheck className="w-5 h-5" /> Confirm verification
      </button>
      <button onClick={() => setStep(1)} className="w-full text-sm text-slate-500 hover:text-indigo-600 transition-colors mt-2">Back</button>
    </div>
  );

  return (
    <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4">
      <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl">
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
            <BadgeCheck className="w-5 h-5" /> Verify trust for {listing.image}
          </h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><X className="w-5 h-5" /></button>
        </div>
        {step === 1 ? VerificationInfo : VerificationInput}
      </div>
    </div>
  );
};

  );
};

const ChatScreen = ({ chat, onBack }) => {
  const [messages, setMessages] = useState(chat.history || []);
  const [input, setInput] = useState("");
  const [suggestions, setSuggestions] = useState([]);
  const [loadingAI, setLoadingAI] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  useEffect(scrollToBottom, [messages]);

  useEffect(() => {
    if (messages.length > 0) {
      const lastMsg = messages[messages.length - 1];
      if (lastMsg.sender === 'them') generateSmartReplies(lastMsg.text);
      else setSuggestions([]);
    }
  }, [messages]);

  const generateSmartReplies = async (incomingText) => {
    setLoadingAI(true);
    await new Promise(r => setTimeout(r, 500));
    setSuggestions(fakeSmartReplies(incomingText));
    setLoadingAI(false);
  };

  const handleSend = (text) => {
    if (!text.trim()) return;
    setMessages([...messages, { id: Date.now(), sender: 'me', text, time: 'Now' }]);
    setInput("");
    setSuggestions([]);
  };

  return (
    <div className="fixed inset-0 bg-slate-50 z-[60] flex flex-col">
      <div className="bg-white px-4 py-3 shadow-sm flex items-center justify-between z-10 border-b border-slate-100">
        <div className="flex items-center gap-3">
          <button onClick={onBack}><ChevronRight className="w-6 h-6 rotate-180 text-slate-500" /></button>
          <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold">{chat.image}</div>
          <div>
            <div className="flex items-center gap-2">
              <h3 className="font-bold text-slate-800">{chat.name}</h3>
              {chat.trust && <TrustGem level={chat.trust} />}
            </div>
            <p className="text-xs text-slate-400">{chat.isGroup ? "Community group" : "Online"}</p>
          </div>
        </div>
        <div className="flex gap-4 text-slate-400">
          <Phone className="w-5 h-5" />
          <Video className="w-5 h-5" />
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-3">
        {messages.map((msg) => (
          <div key={msg.id} className={`flex ${msg.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-[80%] px-4 py-2 rounded-xl text-sm shadow-sm ${msg.sender === 'me' ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-white text-slate-800 rounded-bl-none border border-slate-100'}`}>
              {msg.text}
              <div className={`text-[10px] mt-1 text-right ${msg.sender === 'me' ? 'text-indigo-200' : 'text-slate-400'}`}>{msg.time}</div>
            </div>
          </div>
        ))}
        <div ref={messagesEndRef} />
      </div>

      {loadingAI && (
        <div className="px-4 py-2 flex gap-2">
          <Loader2 className="w-4 h-4 animate-spin text-purple-400" />
          <span className="text-xs text-purple-500">Generating smart replies (simulated)...</span>
        </div>
      )}

      {suggestions.length > 0 && (
        <div className="px-4 py-2 flex gap-2 overflow-x-auto scrollbar-hide">
          {suggestions.map((s, i) => (
            <button key={i} onClick={() => handleSend(s)} className="whitespace-nowrap bg-purple-50 text-purple-700 border border-purple-100 px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1 hover:bg-purple-100 transition-colors">
              <Sparkles className="w-3 h-3" /> {s}
            </button>
          ))}
        </div>
      )}

      <div className="bg-white p-3 border-t border-slate-100 flex items-center gap-2">
        <button className="p-2 text-slate-400"><Plus className="w-6 h-6" /></button>
        <input className="flex-1 bg-slate-100 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-indigo-500"
          placeholder="Type a message..." value={input} onChange={(e) => setInput(e.target.value)}
          onKeyDown={(e) => e.key === 'Enter' && handleSend(input)} />
        <button onClick={() => handleSend(input)} className="p-2 bg-indigo-600 rounded-full text-white shadow-md active:scale-95 transition-transform">
          <Send className="w-5 h-5" />
        </button>
      </div>
    </div>
  );
};

const HoodFeed = ({ onStartChat }) => {
  const [activeSubTab, setActiveSubTab] = useState('notices');
  const [postText, setPostText] = useState("");
  const [toneCheck, setToneCheck] = useState(null);
  const [newPostType, setNewPostType] = useState('info');
  const [digest, setDigest] = useState(null);
  const [loadingDigest, setLoadingDigest] = useState(false);
  const [activeFilter, setActiveFilter] = useState(null);

  const checkTone = async () => {
    if (!postText) return;
    setToneCheck({ status: "checking", suggestion: null, suggestedType: null });
    await new Promise(resolve => setTimeout(resolve, 600));

    let simulatedType = 'info';
    let simulatedStatus = 'Safe';
    let simulatedSuggestion = postText;
    const lower = postText.toLowerCase();

    if (lower.includes('emergency') || lower.includes('found') || lower.includes('stolen')) simulatedType = 'alert';
    else if (lower.includes('sale') || lower.includes('class') || lower.includes('meetup')) simulatedType = 'event';

    if (lower.includes('must') || lower.includes('immediately')) {
      simulatedStatus = 'Unsafe';
      simulatedSuggestion = `[AI rewrite] A friendly reminder that your action is needed regarding: ${postText}`;
    }

    setToneCheck({ status: simulatedStatus, suggestion: simulatedSuggestion, suggestedType: simulatedType });
    setNewPostType(simulatedType);
  };

  const generateDigest = async () => {
    setLoadingDigest(true);
    await new Promise(r => setTimeout(r, 500));
    setDigest(fakeDigest());
    setLoadingDigest(false);
  };

  const filteredNotices = activeFilter ? MOCK_NOTICES.filter(n => n.type === activeFilter) : MOCK_NOTICES;
  const selectedTypeDetails = NOTICE_TYPES.find(t => t.type === newPostType);

  return (
    <div className="p-4 pb-24 h-full flex flex-col">

            {loadingDigest ? <Loader2 className="w-5 h-5 animate-spin" /> : <Sparkles className="w-5 h-5" />}
          </button>
        </div>
        {digest && (
          <div className="bg-black/20 backdrop-blur rounded-xl p-3 mt-2 border border-white/10">
            <div className="flex items-center gap-2 mb-2">
              <Sparkles className="w-3 h-3 text-yellow-300" />
              <span className="text-xs font-bold uppercase tracking-wider text-yellow-300">AI catch-up (simulated)</span>
            </div>
            <ul className="space-y-1">
              {digest.map((item, idx) => (
                <li key={idx} className="text-xs text-white/90 flex gap-2"><span className="opacity-50">•</span> {item}</li>
              ))}
            </ul>
            <button onClick={() => setDigest(null)} className="text-[10px] text-white/50 mt-2 underline">Dismiss</button>
          </div>
        )}
      </div>

      <div className="flex p-1 bg-slate-200 rounded-xl mb-4 font-semibold text-sm">
        <button onClick={() => { setActiveSubTab('notices'); setActiveFilter(null); }} className={`flex-1 py-2 rounded-lg flex items-center justify-center gap-2 transition-all ${activeSubTab === 'notices' ? 'bg-white shadow text-slate-800' : 'text-slate-500'}`}>
          <Bell className="w-4 h-4" /> Notices
        </button>
        <button onClick={() => setActiveSubTab('buzz')} className={`flex-1 py-2 rounded-lg flex items-center justify-center gap-2 transition-all ${activeSubTab === 'buzz' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>
          <Store className="w-4 h-4" /> The buzz
        </button>
      </div>

      <div className="space-y-4 flex-1 overflow-y-auto pb-20">
        {activeSubTab === 'notices' ? (
          <>
            {activeFilter && (
              <div className="flex items-center justify-between bg-slate-800 text-white p-3 rounded-xl shadow-md">
                <span className="text-xs font-bold flex items-center gap-2"><Filter className="w-3 h-3" /> Showing only: {activeFilter.toUpperCase()}</span>

            {!activeFilter && (

                <textarea className="w-full text-sm text-slate-700 placeholder:text-slate-400 outline-none resize-none mb-2" rows="2"
                  placeholder={`Post a ${newPostType} notice...`} value={postText} onChange={(e) => { setPostText(e.target.value); setToneCheck(null); }} />
                {toneCheck && toneCheck.status === "Unsafe" && (
                  <div className="bg-orange-50 text-orange-700 text-xs p-2 rounded-lg mb-2"><span className="font-bold">Suggestion:</span> "{toneCheck.suggestion}"</div>
                )}

                        <h4 className="font-bold text-sm text-slate-800">{notice.author}</h4>
                        <div className="flex items-center gap-2">

                          <TrustGem level={notice.trust} />
                        </div>
                      </div>
                    </div>
                    <button onClick={() => setActiveFilter(notice.type)} className={`text-[10px] px-2 py-0.5 rounded-full font-bold uppercase transition-transform active:scale-95 flex items-center gap-1 border ${typeDetails.color}`}>
                      <TypeIcon className="w-3 h-3" /> {notice.type}

              <button onClick={() => setShowVerifiers(!showVerifiers)} className="p-3 bg-indigo-50 rounded-lg text-left hover:bg-indigo-100 transition-colors">
                <div className="font-bold text-indigo-800 flex items-center mb-1"><CheckCircle2 className="w-4 h-4 mr-1" /> Verified by ({profileData.trustScore})</div>
                <p className="text-xs text-indigo-600 underline">{showVerifiers ? 'Hide details' : 'View neighbors'}</p>
              </button>
            </div>
            <div className="mt-4 pt-4 border-t border-slate-100">
              <h4 className="font-semibold text-slate-700 mb-2 flex items-center gap-2"><Briefcase className="w-4 h-4 text-slate-500" /> Verified skills</h4>
              <div className="flex flex-wrap gap-2">
                {profileData.skillsOffered.map(skill => (
                  <span key={skill} className="text-xs bg-gray-100 text-gray-700 px-3 py-1 rounded-full border border-gray-200">{skill}</span>
                ))}
              </div>
            </div>
          </div>

          {showVerifiers && (
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100">
              <h4 className="font-bold text-sm text-slate-700 mb-3">Community verifiers ({profileData.verifiedBy.length})</h4>
              <ul className="space-y-2">
                {profileData.verifiedBy.map((v, index) => (
                  <li key={index} className="flex items-center justify-between p-2 bg-slate-50 rounded-lg">
                    <div className="flex items-center gap-3">
                      <div className="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-600">{v.name.charAt(0)}</div>
                      <span className="text-sm text-slate-700">{v.name}</span>
                    </div>
                    <TrustGem level={v.trust} />
                  </li>
                ))}
              </ul>
            </div>
          )}
        </div>
      )}

      {!selectedChat && (
        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-2 flex justify-between items-end z-50" style={{maxWidth: '28rem', margin: '0 auto'}}>
          {[
            { id: 'explore', icon: Search, label: 'Explore' },
            { id: 'hood', icon: Users, label: 'My Hood' },
            { id: 'add', icon: Plus, label: 'Share', primary: true, action: () => setIsListingModalOpen(true) },
            { id: 'chat', icon: MessageCircle, label: 'Chat' },
            { id: 'profile', icon: User, label: 'Profile' },
          ].map((tab) => (
            <button key={tab.id} onClick={() => tab.action ? tab.action() : setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 ${tab.primary ? '-mt-8' : ''}`}>
              {tab.primary ? (
                <div className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 text-white active:scale-90 transition-transform"><Plus className="w-8 h-8" /></div>
              ) : (
                <>
                  <tab.icon className={`w-6 h-6 ${activeTab === tab.id ? 'text-indigo-600 fill-current' : 'text-slate-400'}`} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                  <span className={`text-[10px] font-medium ${activeTab === tab.id ? 'text-indigo-600' : 'text-slate-400'}`}>{tab.label}</span>
                </>
              )}
            </button>
          ))}
        </div>
      )}

      {selectedChat && <ChatScreen chat={selectedChat} onBack={() => setSelectedChat(null)} />}

      <ListingModal isOpen={isListingModalOpen} onClose={() => setIsListingModalOpen(false)} onSave={handleListingSave} />
      <VerificationModal isOpen={isVerifyModalOpen} onClose={() => setIsVerifyModalOpen(false)} listing={listingToVerify} onVerifySuccess={handleVerifySuccess} />
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch (e) {
  window.__cooopErr && window.__cooopErr('React render error: ' + (e && e.message ? e.message : String(e)));
}
</script>
</body>
</html>
